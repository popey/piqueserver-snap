name: 🧪 Test snap can be built

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Show log on build failure
        if: ${{ failure() }}
        run: |
          cat /home/runner/.local/state/snapcraft/log/snapcraft*.log
          exit 1

      - name: Review snap
        uses: diddlesnaps/snapcraft-review-action@v1
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          isClassic: 'false'

      - name: Install snap
        run: sudo snap install --dangerous "${{ steps.snapcraft.outputs.snap }}"

      - name: Smoke test service startup
        run: |
          sudo snap restart piqueserver.piqueserver
          sleep 10
          sudo snap services piqueserver | tee snap-services.log
          awk 'NR > 1 && $1 == "piqueserver.piqueserver" && $3 == "active" { found = 1 } END { exit found ? 0 : 1 }' snap-services.log
          test -f /var/snap/piqueserver/common/config.toml
          sudo snap logs piqueserver.piqueserver --lines=100 | tee snap-service.log
          grep -q 'Config: /var/snap/piqueserver/common/config.toml' snap-service.log

      - name: Stop service
        if: ${{ always() }}
        run: sudo snap stop piqueserver.piqueserver

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}
