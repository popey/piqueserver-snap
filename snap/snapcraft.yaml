name: piqueserver
base: core24
adopt-info: piqueserver
summary: Ace of Spades 0.75 server
description: |
  Piqueserver is an Ace of Spades 0.75 server based on PySnip.
grade: stable
confinement: strict

platforms:
  amd64:
  arm64:
  armhf:
  ppc64el:
  s390x:

parts:
  piqueserver:
    plugin: python
    source: https://github.com/piqueserver/piqueserver.git
    source-tag: v1.3.0
    override-pull: |
      craftctl default
      python3 - <<'PY'
      from pathlib import Path

      fixes = {
          Path("piqueserver/extensions.py"): "import importlib\nimport importlib.util\n",
          Path("piqueserver/map.py"): "import importlib\nimport importlib.util\n",
      }

      for path, replacement in fixes.items():
          text = path.read_text()
          text = text.replace("import importlib\n", replacement, 1)
          path.write_text(text)
      PY
      version="$(git describe --tags --abbrev=0)"
      craftctl set version="${version#v}"
    build-packages:
      - build-essential
      - cargo
      - libenet-dev
      - libffi-dev
      - libjpeg-dev
      - libssl-dev
      - rustc
      - zlib1g-dev
    stage-packages:
      - ca-certificates
      - libenet7
      - libffi8
      - libjpeg8
      - libssl3t64
      - python3
      - zlib1g

  launcher:
    plugin: dump
    source: snap/local

apps:
  piqueserver:
    command: bin/launcher
    daemon: simple
    restart-condition: on-failure
    environment:
      PYTHONUNBUFFERED: "1"
    plugs:
      - network
      - network-bind
